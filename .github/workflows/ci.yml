name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Native desktop build dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbcommon-dev libgl1-mesa-dev
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Strict Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Tests
        env:
          SECURE_AI_LIVE_CALLS: "disabled"
        run: cargo test --workspace --all-features

  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependency checks
        run: cargo install cargo-audit cargo-deny --locked
      - name: Vulnerability audit
        run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
      - name: License, source, and ban policy
        run: cargo deny check

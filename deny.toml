[advisories]
unmaintained = "workspace"
ignore = [
  # eframe 0.35.0 -> clipboard -> wayland-scanner proc-macro. It processes only
  # dependency-owned protocol XML at build time, never repository scan input.
  # Remove when the eframe chain accepts quick-xml >=0.41.
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
]

[licenses]
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "OFL-1.1",
  "Ubuntu-font-1.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
